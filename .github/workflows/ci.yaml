name: CI/CD Pipeline GitHub Actions

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      #  EX2.a - Increase version
      - name: Bump version
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          BASE=$(echo $VERSION | cut -d. -f1,2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$BASE.$NEW_PATCH"

          mvn versions:set -DnewVersion=$NEW_VERSION
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      #  Build JAR
      - name: Build app
        run: mvn clean package -DskipTests

      #  Login to DockerHub
      - name: Login to DockerHub
        run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      #  Build Docker image
      - name: Build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/java-app:${{ steps.version.outputs.version }} .

      #  Push image
      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/java-app:${{ steps.version.outputs.version }}

      - name: SSH to server and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/java-app:${{ needs.build.outputs.version }}
            docker stop app || true
            docker rm app || true
            docker run -d -p 8080:8080 --name app ${{ secrets.DOCKER_USERNAME }}/java-app:${{ needs.build.outputs.version }}
